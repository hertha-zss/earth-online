<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Earth Online</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* 登录页 */
#loginPage {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.loginBox {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

/* 系统布局 */
#app {
  display: none;
  height: 100vh;
}

/* 左侧栏 */
.sidebar {
  width: 200px;
  background: white;
  border-right: 1px solid #ddd;
  padding: 10px;
  float: left;
  height: 100vh;
}

.menu {
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
}

.menu:hover {
  background: #eee;
}

/* 主区域 */
.main {
  margin-left: 200px;
  padding: 20px;
}

.page {
  display: none;
}

.active {
  display: block;
}
</style>

</head>

<body>

<!-- 🔐 登录页 -->
<div id="loginPage">
  <div class="loginBox">
    <h2>🌍 Earth Online</h2>
    <p>请输入你的名字进入系统</p>

    <input id="name" placeholder="Your Name" style="width:100%; padding:8px;">
    <button onclick="login()" style="margin-top:10px; width:100%; padding:8px;">
      进入系统
    </button>
  </div>
</div>

<!-- 🌍 系统 -->
<div id="app">

  <!-- 左侧菜单 -->
  <div class="sidebar">
  <h3>Earth Online</h3>

  <div id="menuList"></div>

  <hr>

  <input id="newMenu" placeholder="新增模块" style="width:100%; padding:6px;">
  <button onclick="addMenu()" style="width:100%; margin-top:5px;">
    + 添加
  </button>

  <hr>

  <div class="menu" onclick="logout()">退出</div>
</div>

  <!-- 主内容 -->
  <div class="main">

    <div id="home" class="page active">
      <h2>🌍 欢迎进入系统</h2>
      <p id="userText"></p>
    </div>

    <div id="work" class="page">
      <h2>工作</h2>
    </div>

    <div id="study" class="page">
      <h2>学习</h2>
    </div>

    <div id="hobby" class="page">
      <h2>兴趣</h2>
    </div>

    <div id="play" class="page">
      <h2>娱乐</h2>
    </div>

  </div>
</div>

<script>

// 🔐 登录
function login() {
  let name = document.getElementById("name").value;
  if (!name) return;

  localStorage.setItem("earth_user", name);
  enterApp();
}

// 🚪 进入系统
function enterApp() {
  let user = localStorage.getItem("earth_user");

  if (user) {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("userText").innerText =
      "当前用户：" + user;
  }
}

// 获取当前用户
function getUser() {
  return localStorage.getItem("earth_user");
}




// 🚪 退出
function logout() {
  localStorage.removeItem("earth_user");
  location.reload();
}

// 📄 页面切换
function show(id) {
  document.querySelectorAll(".page").forEach(p => {
    p.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

// 🚀 自动检测登录
window.onload = function () {
  enterApp();
};


// 获取菜单
function getMenus() {
  let user = getUser();
  let data = localStorage.getItem("menus_" + user);
  return data ? JSON.parse(data) : ["主页","工作","学习","兴趣","娱乐"];
}

// 保存菜单
function saveMenus(menus) {
  let user = getUser();
  localStorage.setItem("menus_" + user, JSON.stringify(menus));
}

// 渲染菜单
function renderMenus() {
  let menus = getMenus();
  let box = document.getElementById("menuList");

  box.innerHTML = "";

  menus.forEach((name, index) => {
    let div = document.createElement("div");
    div.className = "menu";
    div.style.display = "flex";
    div.style.justifyContent = "space-between";
    div.style.alignItems = "center";

    // 左侧文字
    let text = document.createElement("span");
    text.innerText = name;
    text.style.cursor = "pointer";
    text.onclick = () => showPage(name);

    // 右侧删除按钮
    let del = document.createElement("span");
    del.innerText = "✕";
    del.style.color = "red";
    del.style.cursor = "pointer";
    del.onclick = (e) => {
      e.stopPropagation();
      deleteMenu(index);
    };

    div.appendChild(text);
    div.appendChild(del);

    box.appendChild(div);
  });
}

// 添加菜单
function addMenu() {
  let name = document.getElementById("newMenu").value;
  if (!name) return;

  let menus = getMenus();
  menus.push(name);

  saveMenus(menus);
  renderMenus();

  document.getElementById("newMenu").value = "";
}

// 删除菜单
function deleteMenu(index) {
  let menus = getMenus();

  let name = menus[index];

  // 🚫 核心模块禁止删除
  const coreModules = ["主页","工作","学习","兴趣","娱乐"];

  if (coreModules.includes(name)) {
    alert("核心系统模块不能删除！");
    return;
  }

  menus.splice(index, 1);

  localStorage.setItem("menus", JSON.stringify(menus));
  renderMenus();
}

// 页面切换（自动生成页面）
function showPage(name) {

  // 如果没有页面就创建
  let page = document.getElementById("page_" + name);

  if (!page) {
    let div = document.createElement("div");
    div.id = "page_" + name;
    div.className = "page";

    div.innerHTML = `<h2>${name}</h2><p>这是 ${name} 页面</p>`;

    document.querySelector(".main").appendChild(div);
  }

  // 切换显示
  document.querySelectorAll(".page").forEach(p => {
    p.classList.remove("active");
  });

  document.getElementById("page_" + name).classList.add("active");
}

// 初始化
window.onload = function () {
  enterApp();
  renderMenus();
};

</script>

</body>
</html>

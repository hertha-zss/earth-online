<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Earth Online v2</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    /* 顶部栏 */
    .topbar {
      background: #111827;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-weight: bold;
    }

    /* tabs */
    .tabs {
      display: flex;
      gap: 10px;
    }

    .tab {
      padding: 6px 12px;
      background: #1f2937;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .tab:hover {
      background: #334155;
    }

    /* 页面内容 */
    .page {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      max-width: 500px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .xp {
      color: #22c55e;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- 顶部导航 -->
<div class="topbar">
  <div class="title">🌍 Earth Online</div>

  <div class="tabs">
    <div class="tab" onclick="show('home')">主页</div>
    <div class="tab" onclick="show('dashboard')">仪表盘</div>
    <div class="tab" onclick="show('calendar')">日历</div>
    <div class="tab" onclick="show('achieve')">成就</div>
  </div>
</div>

<!-- 主页 -->
<div id="home" class="page active">
  <h2>欢迎来到 Earth Online</h2>
  <p>一个人生游戏化系统</p>
</div>

<!-- 仪表盘 -->
<div id="dashboard" class="page">
  <div class="card">
    <h3>📊 今日数据</h3>

    <label>工作</label>
    <input id="work" type="number">

    <label>学习</label>
    <input id="study" type="number">

    <label>兴趣</label>
    <input id="hobby" type="number">

    <label>娱乐</label>
    <input id="play" type="number">

    <button onclick="calc()">生成</button>

    <div id="result" style="margin-top:10px;"></div>
  </div>
</div>

<!-- 日历 -->
<div id="calendar" class="page">
  <h3>📅 人生日历（开发中）</h3>
  <p>未来这里会显示你的每一天格子</p>
</div>

<!-- 成就 -->
<div id="achieve" class="page">
  <h3>🏆 成就系统</h3>
  <ul>
    <li>🌱 初始人生系统已解锁</li>
  </ul>
</div>

<script>
function show(pageId) {
  let pages = document.querySelectorAll(".page");
  pages.forEach(p => p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
}

function calc() {
  let work = +document.getElementById("work").value;
  let study = +document.getElementById("study").value;
  let hobby = +document.getElementById("hobby").value;
  let play = +document.getElementById("play").value;

  let xp = work*8 + study*12 + hobby*6 + play*2;
  let level = Math.floor(xp / 50);

  let score = study*2 + hobby - play;

  let mood = "正常";
  if (score > 5) mood = "高效";
  else if (score < 0) mood = "摆烂";

  document.getElementById("result").innerHTML = `
    <div class="xp">XP: ${xp}</div>
    <div>Level: ${level}</div>
    <div>状态: ${mood}</div>
  `;
}
</script>

</body>
</html>
